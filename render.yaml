services:
  - type: web
    name: interview-ai-api
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_GENAI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
